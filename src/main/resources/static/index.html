<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <canvas id="background-animation"></canvas>
    <button id="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    <div class="container">
        <h1>Global Chat</h1>
        <label for="language">Select Language:</label>
        <select id="language" onchange="connectToChat()">
            <option value="" disabled selected>Select a language</option>
            <option value="english">English</option>
            <option value="hindi">Hindi</option>
            <option value="spanish">Spanish</option>
            <option value="french">French</option>
            <option value="german">German</option>
            <option value="chinese">Chinese</option>
            <option value="arabic">Arabic</option>
            <option value="russian">Russian</option>
            <option value="japanese">Japanese</option>
            <option value="korean">Korean</option>
            <!-- Add more languages as needed -->
        </select>
        <div id="chat-container" style="display:none;">
            <div id="messages"></div>
            <input type="text" id="message" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <div id="rules-popup" class="popup">
        <div class="popup-content">
            <h2>Chat Rules</h2>
            <ol id="rules-message"></ol>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
